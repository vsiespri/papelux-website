<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 270" width="520" height="270">
  <defs>
    <linearGradient id="pl2-lux" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="pl2-wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,188,212,0.1)"/>
      <stop offset="35%" stop-color="#00BCD4" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#00BCD4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="rgba(0,188,212,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Subtle card background -->
  <rect width="520" height="270" rx="18" fill="#F5FAFA"/>

  <!-- ── Sparkle top-left ── -->
  <g transform="translate(82,55)">
    <path d="M0,-16 L2.2,-2.2 L16,0 L2.2,2.2 L0,16 L-2.2,2.2 L-16,0 L-2.2,-2.2 Z" fill="#4DD0E1" opacity="0.9"/>
    <path d="M0,-8 L1.1,-1.1 L8,0 L1.1,1.1 L0,8 L-1.1,1.1 L-8,0 L-1.1,-1.1 Z" fill="white" opacity="0.45"/>
  </g>
  <!-- Sparkle top-right -->
  <g transform="translate(436,50)">
    <path d="M0,-12 L1.7,-1.7 L12,0 L1.7,1.7 L0,12 L-1.7,1.7 L-12,0 L-1.7,-1.7 Z" fill="#4DD0E1" opacity="0.9"/>
  </g>
  <g transform="translate(462,80)">
    <path d="M0,-8 L1.1,-1.1 L8,0 L1.1,1.1 L0,8 L-1.1,1.1 L-8,0 L-1.1,-1.1 Z" fill="#00BCD4" opacity="0.65"/>
  </g>

  <!-- ── Left leaf cluster ── -->
  <g transform="translate(138,56)">
    <!-- back leaf -->
    <ellipse cx="-18" cy="8" rx="22" ry="9" fill="#80CBC4" opacity="0.6"
             transform="rotate(-28,-18,8)"/>
    <!-- middle leaf -->
    <ellipse cx="-2" cy="-14" rx="22" ry="9" fill="#26A69A" opacity="0.85"
             transform="rotate(4,-2,-14)"/>
    <!-- front leaf -->
    <ellipse cx="16" cy="-2" rx="18" ry="8" fill="#4DD0E1" opacity="0.85"
             transform="rotate(28,16,-2)"/>
  </g>

  <!-- ── Right leaf cluster ── -->
  <g transform="translate(396,56)">
    <ellipse cx="-16" cy="-2" rx="19" ry="8" fill="#80CBC4" opacity="0.6"
             transform="rotate(-25,-16,-2)"/>
    <ellipse cx="0" cy="-16" rx="21" ry="9" fill="#26A69A" opacity="0.85"
             transform="rotate(8,0,-16)"/>
    <ellipse cx="16" cy="-2" rx="17" ry="8" fill="#4DD0E1" opacity="0.85"
             transform="rotate(26,16,-2)"/>
  </g>

  <!-- ── Toilet roll icon (right of LUX) ── -->
  <g transform="translate(470,72)">
    <rect x="-14" y="-18" width="28" height="36" rx="7" fill="white" stroke="#80DEEA" stroke-width="2"/>
    <ellipse cx="0" cy="-18" rx="9" ry="4.5" fill="#E0F7FA" stroke="#80DEEA" stroke-width="1.5"/>
    <ellipse cx="0" cy="-15" rx="5.5" ry="2.5" fill="#B2EBF2"/>
    <line x1="-8" y1="-5" x2="8" y2="-5" stroke="#B2EBF2" stroke-width="1.2"/>
    <line x1="-8" y1="2" x2="8" y2="2" stroke="#B2EBF2" stroke-width="1.2"/>
    <line x1="-8" y1="9" x2="8" y2="9" stroke="#B2EBF2" stroke-width="1.2"/>
  </g>

  <!-- ── Main logotype ── -->
  <text x="260" y="152" text-anchor="middle"
        font-family="Montserrat,'Trebuchet MS',Arial,sans-serif"
        font-size="88" letter-spacing="-2">
    <tspan fill="#9E9E9E" font-weight="300">Prime</tspan>
    <tspan fill="url(#pl2-lux)" font-weight="800">LUX</tspan>
  </text>

  <!-- ── Wave underline ── -->
  <path d="M98,170 Q174,155 260,170 Q346,185 420,170"
        stroke="url(#pl2-wave)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ── Subtitle: PAPEL HIGIÉNICO ── -->
  <text x="260" y="212" text-anchor="middle"
        font-family="Montserrat,'Trebuchet MS',Arial,sans-serif"
        font-size="24" font-weight="700" fill="#37474F" letter-spacing="3.5">
    PAPEL HIGIÉNICO
  </text>

  <!-- ── Sub-subtitle: Suavidad Superior ── -->
  <text x="260" y="242" text-anchor="middle"
        font-family="Montserrat,'Trebuchet MS',Arial,sans-serif"
        font-size="17" font-weight="400" fill="#90A4AE" letter-spacing="0.8">
    Suavidad Superior
  </text>
</svg>
