<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 390" width="500" height="390">
  <defs>
    <linearGradient id="gol-arg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#74B9E8"/>
      <stop offset="25%"  stop-color="#AED8F5"/>
      <stop offset="48%"  stop-color="#FFFFFF"/>
      <stop offset="52%"  stop-color="#FFFFFF"/>
      <stop offset="75%"  stop-color="#AED8F5"/>
      <stop offset="100%" stop-color="#74B9E8"/>
    </linearGradient>
    <linearGradient id="gol-navy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#0D1B6E"/>
    </linearGradient>
    <linearGradient id="gol-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="gol-ball-bg" cx="40%" cy="35%" r="60%" fx="40%" fy="35%"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <filter id="gol-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="#0D1B6E" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ── Background burst rays ── -->
  <g opacity="0.25" stroke="#64B5F6" fill="none">
    <line x1="250" y1="200" x2="60"  y2="60"  stroke-width="3"/>
    <line x1="250" y1="200" x2="155" y2="30"  stroke-width="2.5"/>
    <line x1="250" y1="200" x2="250" y2="18"  stroke-width="2.5"/>
    <line x1="250" y1="200" x2="345" y2="30"  stroke-width="2.5"/>
    <line x1="250" y1="200" x2="440" y2="60"  stroke-width="3"/>
    <line x1="250" y1="200" x2="492" y2="160" stroke-width="2"/>
    <line x1="250" y1="200" x2="8"   y2="160" stroke-width="2"/>
    <line x1="250" y1="200" x2="480" y2="270" stroke-width="1.5"/>
    <line x1="250" y1="200" x2="20"  y2="270" stroke-width="1.5"/>
  </g>

  <!-- ── Soccer ball ── -->
  <circle cx="250" cy="208" r="95" fill="white" stroke="#424242" stroke-width="2.5"/>
  <!-- Ball panels (black pentagons approximated) -->
  <polygon points="250,123 266,143 260,167 240,167 234,143"
           fill="#212121" stroke="white" stroke-width="1.5" opacity="0.85"/>
  <polygon points="174,175 188,158 204,164 201,188 183,193"
           fill="#212121" stroke="white" stroke-width="1.5" opacity="0.85"/>
  <polygon points="326,175 312,158 296,164 299,188 317,193"
           fill="#212121" stroke="white" stroke-width="1.5" opacity="0.85"/>
  <polygon points="210,240 222,258 246,256 250,234 228,225"
           fill="#212121" stroke="white" stroke-width="1.5" opacity="0.85"/>
  <polygon points="290,240 278,258 254,256 250,234 272,225"
           fill="#212121" stroke="white" stroke-width="1.5" opacity="0.85"/>
  <!-- Ball shine -->
  <ellipse cx="226" cy="152" rx="22" ry="14" fill="white" opacity="0.25" transform="rotate(-20,226,152)"/>

  <!-- ── PapeLUX header ── -->
  <text x="250" y="108" text-anchor="middle"
        font-family="Montserrat,'Trebuchet MS',Arial,sans-serif"
        font-size="20" font-weight="700" fill="#1A237E" letter-spacing="4">
    Pape<tspan font-weight="800">LUX</tspan>
    <tspan font-size="13" baseline-shift="super" dy="-4">®</tspan>
  </text>

  <!-- ── Stars (3 gold) ── -->
  <!-- Centre star -->
  <g transform="translate(250,65)" filter="url(#gol-shadow)">
    <path d="M0,-24 L5.8,-8.5 L22,-8.5 L9.5,1.8 L14,17.5 L0,9 L-14,17.5 L-9.5,1.8 L-22,-8.5 L-5.8,-8.5 Z"
          fill="url(#gol-gold)"/>
    <path d="M0,-24 L5.8,-8.5 L22,-8.5 L9.5,1.8 L14,17.5 L0,9 L-14,17.5 L-9.5,1.8 L-22,-8.5 L-5.8,-8.5 Z"
          fill="none" stroke="#E65100" stroke-width="1"/>
  </g>
  <!-- Left star -->
  <g transform="translate(192,74)">
    <path d="M0,-18 L4.3,-6.4 L17,-6.4 L7.2,1.3 L10.5,13.2 L0,6.8 L-10.5,13.2 L-7.2,1.3 L-17,-6.4 L-4.3,-6.4 Z"
          fill="url(#gol-gold)"/>
    <path d="M0,-18 L4.3,-6.4 L17,-6.4 L7.2,1.3 L10.5,13.2 L0,6.8 L-10.5,13.2 L-7.2,1.3 L-17,-6.4 L-4.3,-6.4 Z"
          fill="none" stroke="#E65100" stroke-width="0.8"/>
  </g>
  <!-- Right star -->
  <g transform="translate(308,74)">
    <path d="M0,-18 L4.3,-6.4 L17,-6.4 L7.2,1.3 L10.5,13.2 L0,6.8 L-10.5,13.2 L-7.2,1.3 L-17,-6.4 L-4.3,-6.4 Z"
          fill="url(#gol-gold)"/>
    <path d="M0,-18 L4.3,-6.4 L17,-6.4 L7.2,1.3 L10.5,13.2 L0,6.8 L-10.5,13.2 L-7.2,1.3 L-17,-6.4 L-4.3,-6.4 Z"
          fill="none" stroke="#E65100" stroke-width="0.8"/>
  </g>

  <!-- ── GOL lettering ── -->
  <!-- Navy drop-shadow layer -->
  <text x="254" y="302" text-anchor="middle"
        font-family="Impact,'Arial Black',Arial,sans-serif"
        font-size="188" font-weight="900" letter-spacing="6"
        fill="#0D1B6E" opacity="0.75">GOL</text>
  <!-- Gold stroke outline -->
  <text x="250" y="298" text-anchor="middle"
        font-family="Impact,'Arial Black',Arial,sans-serif"
        font-size="188" font-weight="900" letter-spacing="6"
        fill="none" stroke="url(#gol-gold)" stroke-width="8" stroke-linejoin="round">GOL</text>
  <!-- Argentine flag fill -->
  <text x="250" y="298" text-anchor="middle"
        font-family="Impact,'Arial Black',Arial,sans-serif"
        font-size="188" font-weight="900" letter-spacing="6"
        fill="url(#gol-arg)" filter="url(#gol-shadow)">GOL</text>

  <!-- ── Ribbon banner ── -->
  <!-- Left pennant tail -->
  <path d="M44,325 L20,345 L44,360" fill="#0A1560"/>
  <!-- Main ribbon body -->
  <path d="M44,325 Q250,315 456,325 L456,360 Q250,370 44,360 Z" fill="url(#gol-navy)"/>
  <!-- Right pennant tail -->
  <path d="M456,325 L480,345 L456,360" fill="#0A1560"/>
  <!-- Gold top edge -->
  <path d="M44,325 Q250,315 456,325" stroke="url(#gol-gold)" stroke-width="2.2" fill="none"/>
  <!-- Gold bottom edge -->
  <path d="M44,360 Q250,370 456,360" stroke="url(#gol-gold)" stroke-width="2.2" fill="none"/>
  <!-- Ribbon text -->
  <text x="250" y="349" text-anchor="middle"
        font-family="Montserrat,'Trebuchet MS',Arial,sans-serif"
        font-size="22" font-weight="800" fill="white" letter-spacing="4">
    PAPEL HIGIÉNICO
  </text>
</svg>
