<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="380" height="200">
  <defs>
    <linearGradient id="pl-swoosh" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B0BEC5" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#4DD0E1"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="pl-star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="pl-grey" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
  </defs>

  <!-- Grey wispy feather streaks (left) -->
  <path d="M15,68 C42,54 72,62 96,70" stroke="#CFD8DC" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M13,80 C40,68 70,74 93,80" stroke="#B0BEC5" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M14,92 C40,82 68,86 91,91" stroke="#90A4AE" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M17,103 C42,95 68,98 89,102" stroke="#90A4AE" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M22,113 C45,107 68,109 86,113" stroke="#78909C" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Ribbon swoosh — main body -->
  <path d="M88,96 C112,48 162,33 208,53 C238,65 255,88 249,110 C243,132 222,142 196,134 C170,126 152,106 136,109 C120,112 116,130 128,144 C140,158 172,160 200,149"
        stroke="url(#pl-swoosh)" stroke-width="18" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ribbon highlight sheen -->
  <path d="M93,92 C116,47 164,31 207,52 C232,63 248,84 244,106"
        stroke="rgba(224,247,250,0.55)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Large central sparkle -->
  <g transform="translate(203,73)">
    <path d="M0,-23 L3.2,-3.2 L23,0 L3.2,3.2 L0,23 L-3.2,3.2 L-23,0 L-3.2,-3.2 Z" fill="url(#pl-star)"/>
    <ellipse cx="0" cy="0" rx="3.5" ry="3.5" fill="rgba(255,255,255,0.45)"/>
  </g>

  <!-- Medium sparkle upper-right -->
  <g transform="translate(251,46)">
    <path d="M0,-15 L2.1,-2.1 L15,0 L2.1,2.1 L0,15 L-2.1,2.1 L-15,0 L-2.1,-2.1 Z" fill="#00E5FF" opacity="0.9"/>
  </g>

  <!-- Small sparkle lower-left of center -->
  <g transform="translate(162,122)">
    <path d="M0,-10 L1.4,-1.4 L10,0 L1.4,1.4 L0,10 L-1.4,1.4 L-10,0 L-1.4,-1.4 Z" fill="#4DD0E1" opacity="0.8"/>
  </g>

  <!-- Tiny sparkle right -->
  <g transform="translate(235,115)">
    <path d="M0,-7 L1,-1 L7,0 L1,1 L0,7 L-1,1 L-7,0 L-1,-1 Z" fill="#26C6DA" opacity="0.7"/>
  </g>

  <!-- Logo text -->
  <text x="190" y="193" text-anchor="middle"
        font-family="Montserrat,'Trebuchet MS',Arial,sans-serif" font-size="52" letter-spacing="1.5">
    <tspan fill="#9E9E9E" font-weight="300">Pape</tspan><tspan fill="#00695C" font-weight="800">LUX</tspan>
  </text>
</svg>
